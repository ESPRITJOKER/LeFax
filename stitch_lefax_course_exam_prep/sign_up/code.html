<body class="bg-background min-h-screen flex flex-col font-body-md text-on-surface">
<!-- Suppressed Navigation Shell for focused Task-Oriented Login flow -->
<main class="flex-grow flex items-center justify-center px-margin-mobile py-xl md:py-margin-desktop">
<div class="w-full max-w-[440px] bg-white rounded-xl border border-outline-variant p-lg md:p-xl shadow-sm">
<!-- Brand Anchor -->
<div class="mb-xl flex flex-col items-center text-center">
<div class="mb-sm text-excellence-blue">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-excellence-blue">Create Your Account</h1>
<p class="text-on-surface-variant font-body-sm mt-xs">Empowering the next generation of Cameroonian excellence.</p>
</div>
<!-- Signup Form -->
<form class="space-y-lg" id="signup-form">
<!-- Full Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface ml-1" for="full_name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg focus:border-excellence-blue focus:ring-1 focus:ring-excellence-blue outline-none input-transition text-body-md" id="full_name" placeholder="e.g. Jean Dupont" required="" type="text"/>
</div>
</div>
<!-- Phone Number -->
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface ml-1" for="phone">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">call</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg focus:border-excellence-blue focus:ring-1 focus:ring-excellence-blue outline-none input-transition text-body-md" id="phone" required="" type="tel" value="+237 "/>
</div>
</div>
<!-- School Access Code (Optional) -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center px-1">
<label class="font-label-lg text-label-lg text-on-surface" for="access_code">School Access Code</label>
<span class="text-label-md font-label-md text-on-surface-variant">Optional</span>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">vpn_key</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg focus:border-excellence-blue focus:ring-1 focus:ring-excellence-blue outline-none input-transition text-body-md" id="access_code" placeholder="Enter 6-digit B2B code" type="text"/>
</div>
</div>
<!-- OTP Hint -->
<div class="flex items-center gap-sm p-sm bg-surface-container-low rounded-lg border border-outline-variant/30">
<span class="material-symbols-outlined text-action-blue text-[18px]">info</span>
<p class="text-label-md font-label-md text-on-surface-variant">OTP verification will follow this step.</p>
</div>
<!-- Primary Action -->
<button class="w-full bg-excellence-blue text-white py-3.5 rounded-lg font-label-lg text-label-lg btn-active-state transition-all hover:bg-primary-container shadow-sm flex items-center justify-center gap-sm mt-md" type="submit">
                    Sign Up
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Login Link -->
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Already have an account? 
                    <a class="text-excellence-blue font-label-lg hover:underline transition-all" href="#">Log In</a>
</p>
</div>
<!-- Divider -->

<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-md font-label-md">

</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-md">

<script>
        // Micro-interactions for form validation and input focus
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('signup-form');
            const phoneInput = document.getElementById('phone');

            // Maintain +237 prefix
            phoneInput.addEventListener('input', (e) => {
                if (!e.target.value.startsWith('+237 ')) {
                    e.target.value = '+237 ' + e.target.value.replace(/^\+237\s*/, '');
                }
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                // Simulation of transition to OTP screen
                const btn = e.target.querySelector('button');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[20px]">progress_activity</span> Sending OTP...';
                btn.classList.add('opacity-80');
                
                setTimeout(() => {
                    alert('Registration initiated! Redirecting to OTP verification...');
                    btn.innerHTML = originalText;
                    btn.classList.remove('opacity-80');
                }, 1500);
            });
        });
    </script>
