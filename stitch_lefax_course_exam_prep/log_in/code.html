<style>
        body {

            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

            background-size: 24px 24px;
            opacity: 0.03;

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);

<body class="flex flex-col min-h-screen">
<!-- Subtle Background Texture -->
<div class="fixed inset-0 academic-texture pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-xl relative z-10">
<!-- Brand Identity Section -->
<div class="mb-xl text-center">
<div class="flex items-center justify-center mb-md">
<div class="w-12 h-12 bg-excellence-blue rounded-xl flex items-center justify-center text-white shadow-lg">
<span class="material-symbols-outlined text-display-lg" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-excellence-blue mb-xs">Lefax Course</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">The gateway to Grandes Écoles excellence.</p>
</div>
<!-- Login Card -->
<div class="w-full max-w-[440px] glass-panel rounded-2xl p-lg md:p-xl shadow-sm">
<header class="mb-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-text-primary mb-xs">Welcome Back</h2>
<p class="font-body-md text-body-md text-text-secondary">Please enter your details to continue your journey.</p>
</header>
<form action="#" class="space-y-lg" method="POST">
<!-- Phone Number Field -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-text-primary block" for="phone">Phone Number</label>
<div class="relative flex items-center border border-outline-variant rounded-lg focus-within:border-excellence-blue focus-within:ring-1 focus-within:ring-excellence-blue transition-all bg-white">
<div class="pl-md text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">phone_android</span>
</div>
<input class="w-full py-3 px-md bg-transparent border-none focus:ring-0 text-body-md text-on-surface placeholder:text-outline" id="phone" name="phone" placeholder="6XX XXX XXX" required="" type="tel"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-lg text-label-lg text-text-primary" for="password">Password</label>
<a class="font-label-md text-label-md text-excellence-blue hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative flex items-center border border-outline-variant rounded-lg focus-within:border-excellence-blue focus-within:ring-1 focus-within:ring-excellence-blue transition-all bg-white">
<div class="pl-md text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full py-3 px-md bg-transparent border-none focus:ring-0 text-body-md text-on-surface placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="pr-md text-on-surface-variant hover:text-excellence-blue transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full py-4 bg-excellence-blue text-white rounded-xl font-headline-md text-headline-md shadow-md hover:bg-primary-container btn-hover-effect flex items-center justify-center gap-sm" type="submit">
                    Log In
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Sign Up Redirect -->
<div class="mt-xl pt-lg border-t border-outline-variant text-center">
<p class="font-body-md text-body-md text-text-secondary">
                    New to Lefax? 
                    <a class="font-label-lg text-label-lg text-excellence-blue hover:underline ml-xs" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Footer Decorative Element -->
<div class="mt-xl opacity-40">
<div class="flex gap-lg justify-center items-center">
<div class="h-px w-12 bg-outline-variant"></div>
<div class="flex gap-sm">
<div class="w-2 h-2 rounded-full bg-excellence-blue"></div>
<div class="w-2 h-2 rounded-full bg-achievement-gold"></div>
<div class="w-2 h-2 rounded-full bg-excellence-blue"></div>
</div>
<div class="h-px w-12 bg-outline-variant"></div>
</div>
</div>
</main>
<!-- Contextual Information (Floating on Desktop) -->
<aside class="hidden lg:block fixed bottom-lg right-lg w-64 p-md glass-panel rounded-xl shadow-lg border border-outline-variant animate-fade-in">
<div class="flex items-start gap-md">
<div class="bg-secondary-container p-sm rounded-lg">
<span class="material-symbols-outlined text-on-secondary-container">lightbulb</span>
</div>
<div>
<p class="font-label-lg text-label-lg text-on-secondary-container">Study Tip</p>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Log in daily to maintain your learning streak and earn extra FaxCoins!</p>
</div>
</div>
</aside>
<script>
        // Micro-interaction for the password visibility toggle
        const toggleBtn = document.querySelector('button[type="button"]');
        const passwordInput = document.getElementById('password');
        const iconSpan = toggleBtn.querySelector('.material-symbols-outlined');

        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            iconSpan.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });

        // Simple form submission feedback
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            const btn = form.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Validating...';
            // Logic would go here. We simulate for UX demonstration.
        });
    </script>
</body></html>
