</div>
<p class="text-body-lg font-body-lg text-primary leading-relaxed mb-lg">
                Determine the value of the definite integral of <span class="italic font-semibold">f(x) = 3x² - 2x + 5</span> from <span class="italic">x = 0</span> to <span class="italic">x = 2</span>.
            </p>
<div class="relative w-full aspect-video rounded-lg overflow-hidden mb-md border border-outline-variant">
<div class="absolute inset-0 bg-cover bg-center" data-alt="A clean mathematical visualization on a white background showing a parabolic curve plotted on a Cartesian coordinate system. The area under the curve between x equals zero and x equals two is highlighted with a soft excellence blue shade. The style is professional and academic, resembling a high-quality textbook illustration with precise lines and clear labeling. Soft lighting emphasizes the clarity and functional minimalism of the educational content." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDJvr3NMa55-t3XHeyN8y2R7tFUo4g_qR5a6PLcg2J5avqfvbDQYF5NjMIw3Gl7nm2JmntyZxo2GvUeQV822b-_jT7OIs5j1DBZf8m3W3J4WKWj09Jz65PV8Twdlq6zFoZkp4U3ZJoPTL6OWxhyZHKyEhhPQ2b_qUECJYhj2Nlm-N6IiiiFjAsYh2mkplF9c_zY3zqxI0uUm_jAPRv8nVbkYuPpKX4JeZUioDD-deli27z48Pvrg_tgL5byd3NtUQ3KWHTTxkGE6Xg')">

<span class="text-label-md font-label-md">Wallet</span>
</a>

<script>
        function selectOption(element) {
            // Remove selection from all options
            const options = document.querySelectorAll('.option-card');
            options.forEach(opt => {
                opt.classList.remove('option-selected');
                opt.querySelector('div').classList.remove('bg-excellence-blue', 'text-white');
                opt.querySelector('div').classList.add('bg-surface-container');
                opt.querySelector('div span').classList.remove('text-white');
                opt.querySelector('div span').classList.add('text-primary');
            });

            // Add selection to clicked option
            element.classList.add('option-selected');
            const letterContainer = element.querySelector('div');
            letterContainer.classList.remove('bg-surface-container');
            letterContainer.classList.add('bg-excellence-blue');
            letterContainer.querySelector('span').classList.remove('text-primary');
            letterContainer.querySelector('span').classList.add('text-white');

            // Enable Next button
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            nextBtn.classList.add('opacity-100');
        }

        // Simple haptic-like feedback on click
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(10);
                }
            });
        });
    </script>
